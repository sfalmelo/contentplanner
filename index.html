<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Searchflow — Content Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F2F7;--card:#FFFFFF;--accent:#1DC9A4;--accent-d:#15A888;
  --accent-l:#E8FBF7;--accent-m:rgba(29,201,164,0.1);
  --text:#1C1C1E;--t2:#6D6D72;--t3:#AEAEB2;--sep:#E5E5EA;
  --red:#FF3B30;--orange:#FF9500;--green:#34C759;--blue:#007AFF;
  --sh:0 1px 3px rgba(0,0,0,0.07),0 4px 12px rgba(0,0,0,0.05);
  --sh-sm:0 1px 2px rgba(0,0,0,0.06);--r:14px;--rs:10px;--rx:8px;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Manrope',sans-serif;color:var(--text);display:flex}
.sb{width:252px;min-width:252px;background:var(--card);border-right:1px solid var(--sep);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.sb-head{padding:18px 14px 8px}
.logo{margin-bottom:12px}
.sb-search{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:9px;padding:7px 10px}
.sb-search svg{flex-shrink:0;color:var(--t3)}
.sb-search input{background:none;border:none;outline:none;font-size:13px;font-family:'Manrope',sans-serif;color:var(--text);width:100%}
.sb-search input::placeholder{color:var(--t3)}
.sb-nav{display:flex;gap:3px;padding:8px 8px 4px}
.sn{flex:1;padding:6px 4px;border-radius:var(--rx);border:none;background:transparent;color:var(--t2);font-size:12px;font-weight:600;font-family:'Manrope',sans-serif;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:5px}
.sn:hover{background:var(--bg)}.sn.on{background:var(--accent-m);color:var(--accent-d)}
.sn-badge{background:var(--red);color:#fff;border-radius:10px;padding:1px 5px;font-size:10px;font-weight:700;min-width:16px;text-align:center;line-height:1.4}
.sb-label{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;padding:8px 14px 4px}
.sb-list{flex:1;overflow-y:auto;padding:2px 6px}
.sb-list::-webkit-scrollbar{width:0}
.cl{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:var(--rx);cursor:pointer;transition:background .12s;position:relative}
.cl:hover{background:var(--bg)}.cl.on{background:var(--accent-m)}
.av{width:33px;height:33px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ci{flex:1;min-width:0}
.cn{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl.on .cn{color:var(--accent-d)}.cc{font-size:11px;color:var(--t3);margin-top:1px}
.cl-del{width:22px;height:22px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .12s;flex-shrink:0;color:var(--t3)}
.cl:hover .cl-del{opacity:1}.cl-del:hover{background:#FFF0EF;color:var(--red)}
.chev{color:var(--t3);opacity:0;transition:opacity .12s;flex-shrink:0}
.cl:hover .chev,.cl.on .chev{opacity:1}.cl.on .chev{color:var(--accent)}
.sb-foot{padding:10px 6px;border-top:1px solid var(--sep)}
.btn-add{width:100%;padding:8px 12px;background:var(--accent);border:none;border-radius:var(--rx);color:#fff;font-size:13px;font-weight:700;font-family:'Manrope',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .12s}
.btn-add:hover{background:var(--accent-d)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top{padding:16px 22px 10px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;background:var(--bg)}
.top h1{font-size:24px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.top h1 span{color:var(--accent)}.top-sub{font-size:12px;color:var(--t2);margin-top:2px}
.top-r{display:flex;align-items:center;gap:8px}
.seg{display:flex;background:rgba(0,0,0,.06);border-radius:9px;padding:2px;gap:1px}
.seg-btn{padding:5px 11px;border-radius:7px;border:none;background:transparent;color:var(--t2);font-size:12px;font-weight:600;font-family:'Manrope',sans-serif;cursor:pointer;transition:all .12s;white-space:nowrap}
.seg-btn.on{background:#fff;color:var(--text);box-shadow:var(--sh-sm)}
.btn-new{display:flex;align-items:center;gap:5px;padding:7px 14px;background:var(--accent);border:none;border-radius:var(--rx);color:#fff;font-size:13px;font-weight:700;font-family:'Manrope',sans-serif;cursor:pointer;transition:background .12s;white-space:nowrap}
.btn-new:hover{background:var(--accent-d)}
.sub{display:flex;align-items:center;justify-content:space-between;padding:0 22px 10px;gap:12px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:4px;background:var(--card);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:600;color:var(--t2);box-shadow:var(--sh-sm)}
.dot{width:5px;height:5px;border-radius:50%}
.vtabs{display:flex;background:rgba(0,0,0,.06);border-radius:9px;padding:2px;gap:1px}
.vtab{padding:5px 11px;border-radius:7px;border:none;background:transparent;color:var(--t2);font-size:12px;font-weight:600;font-family:'Manrope',sans-serif;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:4px}
.vtab.on{background:#fff;color:var(--text);box-shadow:var(--sh-sm)}
.area{flex:1;overflow-y:auto;padding:4px 22px 22px}
.area::-webkit-scrollbar{width:4px}
.area::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:2px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;text-align:center;padding:40px}
.empty-ico{width:60px;height:60px;border-radius:16px;background:var(--card);box-shadow:var(--sh);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:4px}
.empty h3{font-size:16px;font-weight:700}.empty p{font-size:13px;color:var(--t2);max-width:240px;line-height:1.5}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);transition:transform .14s,box-shadow .14s;display:flex;align-items:stretch;overflow:hidden;padding:12px 14px;gap:12px}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.09)}
.cv{width:56px;height:56px;min-width:56px;border-radius:10px;background:var(--bg);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cv img,.cv video{width:100%;height:100%;object-fit:cover}
.ve{display:flex;flex-direction:column;align-items:center;gap:3px}
.ve svg{opacity:.18}.ve span{font-size:9px;color:var(--t3)}
.sp{position:absolute;inset:0;display:none}
.pi{position:absolute;bottom:2px;right:2px;width:16px;height:16px;border-radius:4px;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:var(--text)}
.s-draft{background:rgba(255,255,255,.88);color:var(--t2)}
.s-scheduled{background:rgba(255,149,0,.14);color:#b87000;border:1px solid rgba(255,149,0,.28)}
.s-published{background:rgba(52,199,89,.14);color:#1f8f3a;border:1px solid rgba(52,199,89,.28)}
.type-b{display:none}
.tb-org{background:rgba(0,122,255,.13);color:#0055cc;border:1px solid rgba(0,122,255,.22)}
.tb-ad{background:rgba(255,149,0,.15);color:#b87000;border:1px solid rgba(255,149,0,.28)}
.dl-btn{width:24px;height:24px;border-radius:7px;border:none;background:var(--bg);color:var(--blue);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s;flex-shrink:0}
.dl-btn:hover{background:#EEF5FF}
.cb{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.card-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.card-status{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.card-type{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700}
.cap{font-size:13px;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cap.dim{color:var(--t3);font-style:italic}
.cm{display:flex;align-items:center;justify-content:space-between;margin-top:7px}
.cdate{font-size:11px;color:var(--t3);font-weight:500;display:flex;align-items:center;gap:3px}
.cbtns{display:flex;gap:3px}
.ib{width:26px;height:26px;border-radius:7px;border:none;background:var(--bg);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.ib:hover{background:var(--accent-l);color:var(--accent)}
.ib.del:hover{background:#FFF0EF;color:var(--red)}
.lv{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.li{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--sep);transition:background .12s}
.li:last-child{border-bottom:none}.li:hover{background:var(--bg)}
.lt{width:46px;height:46px;border-radius:9px;background:var(--bg);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.lt img{width:100%;height:100%;object-fit:cover}.lt-e{font-size:18px;opacity:.2}
.lb{flex:1;min-width:0}
.lc{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lm{font-size:11px;color:var(--t2);margin-top:2px;display:flex;gap:7px;align-items:center}
.ltags{font-size:11px;color:var(--accent);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.lr{display:flex;align-items:center;gap:6px}
.ls{padding:3px 7px;border-radius:20px;font-size:10px;font-weight:700}
.lb-type{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700}
.calw{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.caln{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--sep)}
.calt{font-size:15px;font-weight:700;flex:1}
.calnb{width:30px;height:30px;border-radius:var(--rx);border:1px solid var(--sep);background:transparent;color:var(--t2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.calnb:hover{background:var(--bg)}
.calg{display:grid;grid-template-columns:repeat(7,1fr)}
.cdh{text-align:center;font-size:10px;font-weight:700;color:var(--t3);padding:8px 4px;text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--sep)}
.cc{border-right:1px solid var(--sep);border-bottom:1px solid var(--sep);min-height:82px;padding:5px}
.cc:nth-child(7n){border-right:none}.cc:hover{background:var(--bg)}.cc.tod{background:var(--accent-l)}.cc.oth{opacity:.3}
.cnum{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:3px}.cc.tod .cnum{color:var(--accent)}
.cdot{padding:2px 5px;border-radius:4px;font-size:9px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cdot.s-draft{background:#F2F2F7;color:var(--t2)}.cdot.s-scheduled{background:#FFF7E6;color:#b87000}.cdot.s-published{background:#EDFAF2;color:#1f8f3a}
.cmore{font-size:9px;color:var(--t3)}
.today-wrap{display:flex;flex-direction:column;gap:6px}
.today-section{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:10px}
.tc-head{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--sep)}
.tc-av{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.tc-name{font-size:13px;font-weight:700}
.tc-count{font-size:11px;color:var(--t3);margin-left:auto}
.todo{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--sep);transition:background .12s}
.todo:last-child{border-bottom:none}.todo:hover{background:var(--bg)}
.todo.done{opacity:.45}
.todo.done .todo-cap{text-decoration:line-through;color:var(--t3)}
.chk{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--sep);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk:hover{border-color:var(--accent)}.chk.on{background:var(--accent);border-color:var(--accent)}
.todo-thumb{width:40px;height:40px;border-radius:8px;background:var(--bg);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:.3}
.todo-thumb img{width:100%;height:100%;object-fit:cover;opacity:1}
.todo-body{flex:1;min-width:0}
.todo-cap{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.todo-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
.todo-time{font-size:11px;color:var(--t3);font-weight:500}
.todo-pl{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;background:var(--bg);color:var(--t2)}
.todo-type{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px}
.todo-dl{width:28px;height:28px;border-radius:8px;border:none;background:var(--bg);color:var(--blue);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.todo-dl:hover{background:#EEF5FF}
.today-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center;background:var(--card);border-radius:var(--r);box-shadow:var(--sh)}
.today-empty h3{font-size:16px;font-weight:700}.today-empty p{font-size:13px;color:var(--t2);line-height:1.5}
.today-progress{display:flex;align-items:center;gap:10px;padding:10px 2px 14px}
.prog-bar{flex:1;height:6px;background:var(--sep);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.prog-label{font-size:11px;font-weight:700;color:var(--t2);white-space:nowrap}
.type-toggle{display:flex;background:rgba(0,0,0,.05);border-radius:9px;padding:2px;gap:1px}
.tt{flex:1;padding:7px 10px;border-radius:7px;border:none;background:transparent;font-size:12px;font-weight:700;font-family:'Manrope',sans-serif;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:5px;color:var(--t2)}
.tt.on{background:#fff;box-shadow:var(--sh-sm)}
.tt.on.org{color:var(--blue)}.tt.on.ad{color:var(--orange)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(10px) saturate(160%)}
.mo{background:var(--bg);border-radius:20px;width:510px;max-width:calc(100vw - 28px);max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.18)}
.mo::-webkit-scrollbar{width:4px}.mo::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:2px}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:var(--card);border-radius:20px 20px 0 0;border-bottom:1px solid var(--sep)}
.mh h2{font-size:16px;font-weight:700}
.mc{width:28px;height:28px;border-radius:50%;border:none;background:rgba(0,0,0,.07);color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s}
.mc:hover{background:rgba(0,0,0,.12)}
.mb{padding:14px 18px;display:flex;flex-direction:column;gap:11px}
.mf{display:flex;justify-content:flex-end;gap:7px;padding:10px 18px 18px;background:var(--bg);border-radius:0 0 20px 20px}
.fi{display:flex;flex-direction:column;gap:5px}
.fi label{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:.3px}
input[type=text],input[type=date],input[type=time],select,textarea{background:var(--card);border:1px solid var(--sep);border-radius:var(--rx);padding:9px 11px;font-size:13px;font-family:'Manrope',sans-serif;color:var(--text);outline:none;transition:border-color .12s,box-shadow .12s;width:100%;-webkit-appearance:none;box-shadow:var(--sh-sm)}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,201,164,.13)}
textarea{resize:vertical;min-height:78px;line-height:1.5}
select{cursor:pointer}select option{background:#fff}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.uz{border:1.5px dashed var(--sep);border-radius:var(--rs);padding:22px 16px;text-align:center;cursor:pointer;background:var(--card);box-shadow:var(--sh-sm);transition:all .12s;position:relative}
.uz:hover,.uz.over{border-color:var(--accent);background:var(--accent-l)}
.uz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.uz p{font-size:13px;color:var(--t2);line-height:1.4}.uz p b{color:var(--accent)}.uz small{font-size:11px;color:var(--t3)}
.pv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
.pv-item{border-radius:var(--rx);overflow:hidden;aspect-ratio:1;position:relative;box-shadow:var(--sh-sm);background:var(--bg)}
.pv-item img,.pv-item video{width:100%;height:100%;object-fit:cover}
.pv-item-pdf{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px}
.pv-item-pdf span{font-size:9px;color:var(--t2);text-align:center;word-break:break-all;line-height:1.3}
.pv-item-overlay{position:absolute;top:4px;right:4px;display:flex;gap:3px;opacity:0;transition:opacity .12s}
.pv-item:hover .pv-item-overlay{opacity:1}
.prm,.pdl{width:22px;height:22px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px}
.prm{background:rgba(255,59,48,.9);color:#fff}.pdl{background:rgba(255,255,255,.95);color:var(--blue)}
.pv-add{border:1.5px dashed var(--sep);border-radius:var(--rx);aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--card);transition:all .12s;position:relative;color:var(--t3);font-size:20px}
.pv-add:hover{border-color:var(--accent);background:var(--accent-l);color:var(--accent)}
.pv-add input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.tw{display:flex;flex-wrap:wrap;gap:5px;align-items:center;background:var(--card);border:1px solid var(--sep);border-radius:var(--rx);padding:6px 9px;cursor:text;transition:border-color .12s,box-shadow .12s;box-shadow:var(--sh-sm);min-height:40px}
.tw:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,201,164,.13)}
.tc{background:var(--accent-l);color:var(--accent-d);border-radius:5px;padding:2px 6px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:3px}
.tc button{background:none;border:none;color:inherit;cursor:pointer;font-size:11px;padding:0;opacity:.6}
.tc button:hover{opacity:1}
.ti{background:none;border:none;outline:none;font-size:12px;font-family:'Manrope',sans-serif;color:var(--text);min-width:80px;padding:2px 0;flex:1}
.btn-cancel{padding:8px 16px;border-radius:var(--rx);border:1px solid var(--sep);background:var(--card);color:var(--t2);font-size:13px;font-weight:600;font-family:'Manrope',sans-serif;cursor:pointer;transition:all .12s;box-shadow:var(--sh-sm)}
.btn-cancel:hover{background:var(--bg)}
.btn-save{padding:8px 20px;border-radius:var(--rx);border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:700;font-family:'Manrope',sans-serif;cursor:pointer;transition:background .12s}
.btn-save:hover{background:var(--accent-d)}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.nc{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.nc h2{font-size:18px;font-weight:700;color:var(--t2)}.nc p{font-size:13px;color:var(--t3)}
.cpick{display:flex;gap:6px;flex-wrap:wrap}
.cdot2{width:26px;height:26px;border-radius:50%;cursor:pointer;transition:transform .1s;border:3px solid transparent}
.cdot2:hover{transform:scale(1.1)}.cdot2.on{border-color:rgba(0,0,0,.28)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:rgba(28,28,30,.93);color:#fff;font-size:13px;font-weight:600;padding:9px 16px;border-radius:20px;display:flex;align-items:center;gap:6px;z-index:9999;transition:transform .25s cubic-bezier(.34,1.56,.64,1);backdrop-filter:blur(16px);white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0)}
.tck{width:17px;height:17px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="sb">
  <div class="sb-head">
    <div class="sb-search">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.4"/><path d="M9 9l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <input type="text" placeholder="Zoek klant..." id="srch" oninput="filterC()"/>
    </div>
  </div>
  <div class="sb-nav">
    <button class="sn on" id="navClients" onclick="switchNav('clients')">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="4.5" cy="3.5" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M1 10c0-2 1.5-3 3.5-3s3.5 1 3.5 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="9" cy="4" r="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M10.5 9.5c0-1.5-1-2.5-2.5-2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Klanten
    </button>
    <button class="sn" id="navToday" onclick="switchNav('today')">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1.5" width="10" height="9.5" rx="2" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M1 4.5h10M4 1v2M8 1v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Vandaag
      <span class="sn-badge" id="todayBadge" style="display:none">0</span>
    </button>
  </div>
  <div class="sb-label">Klanten</div>
  <div class="sb-list" id="cList"></div>
  <div class="sb-foot">
    <button class="btn-add" onclick="openCM()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
      Klant toevoegen
    </button>
  </div>
</div>

<div class="main">
  <div class="nc" id="ncv">
    <div style="font-size:48px;opacity:.12">📋</div>
    <h2>Selecteer een klant</h2>
    <p>Kies links of bekijk je taken voor vandaag</p>
  </div>
  <div id="cv" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div class="top">
      <div>
        <h1 id="ctitle">—</h1>
        <div class="top-sub" id="csub"></div>
      </div>
      <div class="top-r">
        <div class="seg">
          <button class="seg-btn on" data-f="all" onclick="setF('all',this)">Alle</button>
          <button class="seg-btn" data-f="draft" onclick="setF('draft',this)">Concept</button>
          <button class="seg-btn" data-f="scheduled" onclick="setF('scheduled',this)">Gepland</button>
          <button class="seg-btn" data-f="published" onclick="setF('published',this)">Gepubliceerd</button>
        </div>
        <button class="btn-new" onclick="openPM()">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
          Nieuwe post
        </button>
      </div>
    </div>
    <div class="sub">
      <div class="chips" id="chips"></div>
      <div class="vtabs">
        <button class="vtab on" onclick="setV('grid',this)"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="1" y="1" width="3.5" height="3.5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="6.5" y="1" width="3.5" height="3.5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="6.5" width="3.5" height="3.5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="6.5" y="6.5" width="3.5" height="3.5" rx="1" stroke="currentColor" stroke-width="1.2"/></svg> Raster</button>
        <button class="vtab" onclick="setV('list',this)"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1 3h9M1 5.5h9M1 8h9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg> Lijst</button>
        <button class="vtab" onclick="setV('calendar',this)"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="1" y="1.5" width="9" height="8.5" rx="1.5" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M1 4.5h9M3.5 1v1.5M7.5 1v1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg> Kalender</button>
      </div>
    </div>
    <div class="area" id="area"></div>
  </div>
  <div id="tv" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div class="top">
      <div>
        <h1>Taken voor <span id="todayDateLabel">vandaag</span></h1>
        <div class="top-sub" id="todaySub"></div>
      </div>
      <div class="top-r">
        <div class="seg">
          <button class="seg-btn" onclick="chDay(-1)">‹ Vorige</button>
          <button class="seg-btn on" id="btnToday" onclick="goToday()">Vandaag</button>
          <button class="seg-btn" onclick="chDay(1)">Volgende ›</button>
        </div>
        <input type="date" id="dayPicker" style="padding:6px 10px;font-size:12px;border-radius:var(--rx);border:1px solid var(--sep);background:var(--card);color:var(--text);font-family:Manrope,sans-serif;cursor:pointer;box-shadow:var(--sh-sm)" oninput="pickDay(this.value)"/>
      </div>
    </div>
    <div class="area" id="todayArea"></div>
  </div>
</div>

<!-- CLIENT MODAL -->
<div class="ov" id="cm" style="display:none" onclick="if(event.target===this)closeCM()">
  <div class="mo">
    <div class="mh"><h2>Klant toevoegen</h2><button class="mc" onclick="closeCM()">✕</button></div>
    <div class="mb">
      <div class="fi"><label>Bedrijfsnaam</label><input type="text" id="cNm" placeholder="Bijv. Bakkerij de Molen"/></div>
      <div class="fi"><label>Branche</label><input type="text" id="cInd" placeholder="Horeca, E-commerce, Retail..."/></div>
      <div class="fi"><label>Kleur</label><div class="cpick" id="cpick"></div></div>
    </div>
    <div class="mf">
      <button class="btn-cancel" onclick="closeCM()">Annuleren</button>
      <button class="btn-save" id="btnSaveC" onclick="saveC()">Aanmaken</button>
    </div>
  </div>
</div>

<!-- POST MODAL -->
<div class="ov" id="pm" style="display:none" onclick="if(event.target===this)closePM()">
  <div class="mo">
    <div class="mh"><h2 id="pmTitle">Nieuwe post</h2><button class="mc" onclick="closePM()">✕</button></div>
    <div class="mb">
      <div class="fi">
        <label>Type post</label>
        <div class="type-toggle">
          <button class="tt org on" id="ttOrg" onclick="setType('organic')">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M6 3.5v2.5l2 1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            Organisch
          </button>
          <button class="tt ad" id="ttAd" onclick="setType('ad')">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="3" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M4 3V2a2 2 0 014 0v1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            Advertentie
          </button>
        </div>
      </div>
      <div class="fi">
        <label>Bestanden (afbeelding, video of PDF)</label>
        <div id="uz" class="uz" ondragover="dOv(event)" ondragleave="dLv(event)" ondrop="dDp(event)">
          <input type="file" accept="image/*,video/*,application/pdf" multiple onchange="hImg(event)"/>
          <div style="font-size:22px;margin-bottom:5px;opacity:.25">📎</div>
          <p>Sleep hierheen of <b>klik om te uploaden</b></p>
          <small>Meerdere bestanden toegestaan · Afbeelding, video of PDF</small>
        </div>
        <div id="pvGrid" style="display:none">
          <div class="pv-grid" id="pvItems"></div>
        </div>
      </div>
      <div class="fi"><label>Caption</label><textarea id="pCap" placeholder="Schrijf de caption..."></textarea></div>
      <div class="fi">
        <label>Hashtags</label>
        <div class="tw" id="tw" onclick="document.getElementById('ti').focus()">
          <input class="ti" id="ti" placeholder="#hashtag + spatie..." onkeydown="hTag(event)"/>
        </div>
      </div>
      <div class="r2">
        <div class="fi"><label>Platform</label>
          <select id="pPl"><option>Instagram</option><option>LinkedIn</option><option>Facebook</option><option>Twitter/X</option><option>TikTok</option></select>
        </div>
        <div class="fi"><label>Status</label>
          <select id="pSt"><option value="draft">Concept</option><option value="scheduled">Gepland</option><option value="published">Gepubliceerd</option></select>
        </div>
      </div>
      <div class="r2">
        <div class="fi"><label>Datum</label><input type="date" id="pDt"/></div>
        <div class="fi"><label>Tijdstip</label><input type="time" id="pTm" value="09:00"/></div>
      </div>
    </div>
    <div class="mf">
      <button class="btn-cancel" onclick="closePM()">Annuleren</button>
      <button class="btn-save" id="btnSaveP" onclick="saveP()">Opslaan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <div class="tck"><svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1.5 4.5l2.5 2.5 3.5-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <span id="tmsg"></span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── SUPABASE ──
const SB = supabase.createClient(
  'https://asjtddqdwzayhmowadxi.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzanRkZHFkd3pheWhtb3dhZHhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyOTM5MzQsImV4cCI6MjA5MTg2OTkzNH0.beLTLYiGW6gs9M29pzFcpklJUfEYub3xcvB7mPl-7W8'
);

// ── STATE ──
let clients=[],posts={},aid=null,filt='all',view='grid',eid=null,tags=[],files=[],cal=new Date(),postType='organic',checked={},viewDate=new Date();
const COLS=['#1DC9A4','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#F7B731','#9B59B6','#E67E22','#2ECC71','#3498DB'];
const SNL={draft:'Concept',scheduled:'Gepland',published:'Gepubliceerd'};
const SCL={draft:'s-draft',scheduled:'s-scheduled',published:'s-published'};

// ── NORMALIZE ROW → APP FORMAT ──
function normPost(row){
  const fs=(row.post_files||[]).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  return{
    id:row.id,
    clientId:row.client_id,
    caption:row.caption||'',
    platform:row.platform||'Instagram',
    status:row.status||'draft',
    postType:row.post_type||'organic',
    date:row.date||'',
    time:row.time?row.time.slice(0,5):'',
    hashtags:row.hashtags||[],
    imgFiles:fs.map(f=>({url:f.public_url,name:f.file_name,fileType:f.file_type,storagePath:f.storage_path,dbId:f.id})),
    imgData:fs[0]?.public_url||null,
  };
}

// ── INIT ──
(async()=>{
  try{checked=JSON.parse(localStorage.getItem('sf_checked')||'{}')}catch(e){}
  const td=todayKey();
  Object.keys(checked).forEach(k=>{if(!k.startsWith(td+'_'))delete checked[k]});
  await loadClients();
  iCP();
  document.getElementById('pDt').value=new Date().toISOString().split('T')[0];
  document.getElementById('dayPicker').value=new Date().toISOString().split('T')[0];
  updateViewDateLabel();
})();

// ── DATA LOADING ──
async function loadClients(){
  const{data,error}=await SB.from('clients').select('*').order('created_at');
  if(error){console.error(error);toast('Fout bij laden klanten');return}
  clients=data||[];
  rSB();updateTodayBadge();
}

async function loadPostsForClient(clientId){
  const{data,error}=await SB.from('posts')
    .select('*, post_files(*)')
    .eq('client_id',clientId)
    .order('date',{ascending:true,nullsFirst:true});
  if(error){console.error(error);return}
  posts[clientId]=(data||[]).map(normPost);
}

// ── DATE HELPERS ──
function todayKey(){return new Date().toISOString().split('T')[0]}
function viewKey(){return viewDate.toISOString().split('T')[0]}
function isToday(){return viewKey()===todayKey()}
function updateViewDateLabel(){
  const label=isToday()?'vandaag':viewDate.toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('todayDateLabel').textContent=label;
  document.getElementById('dayPicker').value=viewKey();
  document.getElementById('btnToday').classList.toggle('on',isToday());
}
function chDay(d){viewDate=new Date(viewDate);viewDate.setDate(viewDate.getDate()+d);updateViewDateLabel();rToday()}
function goToday(){viewDate=new Date();updateViewDateLabel();rToday()}
function pickDay(val){if(!val)return;viewDate=new Date(val+'T12:00:00');updateViewDateLabel();rToday()}

// ── NAV ──
function switchNav(tab){
  document.getElementById('navClients').classList.toggle('on',tab==='clients');
  document.getElementById('navToday').classList.toggle('on',tab==='today');
  if(tab==='today'){
    document.getElementById('ncv').style.display='none';
    document.getElementById('cv').style.display='none';
    document.getElementById('tv').style.display='flex';
    rToday();
  }else{
    document.getElementById('tv').style.display='none';
    if(aid){document.getElementById('cv').style.display='flex';document.getElementById('ncv').style.display='none'}
    else{document.getElementById('ncv').style.display='flex'}
  }
}

// ── SIDEBAR ──
function rSB(q=''){
  const L=document.getElementById('cList');
  const f=q?clients.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())):clients;
  if(!f.length){L.innerHTML=`<div style="padding:14px 8px;font-size:12px;color:var(--t3);text-align:center">${q?'Geen resultaten':'Nog geen klanten'}</div>`;return}
  L.innerHTML=f.map(c=>{
    const ini=c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return`<div class="cl${aid===c.id?' on':''}" onclick="selC('${c.id}')">
      <div class="av" style="background:${c.color}1A;color:${c.color}">${ini}</div>
      <div class="ci"><div class="cn">${e(c.name)}</div></div>
      <button class="cl-del" onclick="delC(event,'${c.id}')" title="Verwijderen">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 3h8M3.5 3V2h4v1M2.5 3l.6 6.5h4.8L8.5 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
      <svg class="chev" width="5" height="9" viewBox="0 0 5 9" fill="none"><path d="M1 1l3 3.5L1 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>`;
  }).join('');
}
function filterC(){rSB(document.getElementById('srch').value)}

async function selC(id){
  aid=id;filt='all';
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('on',b.dataset.f==='all'));
  rSB(document.getElementById('srch').value);
  const c=clients.find(x=>x.id===id);
  document.getElementById('ncv').style.display='none';
  document.getElementById('tv').style.display='none';
  document.getElementById('navClients').classList.add('on');
  document.getElementById('navToday').classList.remove('on');
  document.getElementById('cv').style.display='flex';
  const ws=c.name.split(' ');const last=ws.pop();
  document.getElementById('ctitle').innerHTML=`${ws.join(' ')} <span>${e(last)}</span>`;
  document.getElementById('area').innerHTML=`<div class="empty"><div class="empty-ico" style="font-size:20px">⏳</div><h3>Laden...</h3></div>`;
  await loadPostsForClient(id);
  rStats();rC();
}

async function delC(ev,id){
  ev.stopPropagation();
  const c=clients.find(x=>x.id===id);
  if(!confirm(`"${c?.name}" en alle bijbehorende posts verwijderen?`))return;
  // delete storage files
  if(posts[id]){
    for(const p of posts[id]){
      for(const f of(p.imgFiles||[])){
        if(f.storagePath)await SB.storage.from('post-files').remove([f.storagePath]);
      }
    }
  }
  await SB.from('clients').delete().eq('id',id);
  clients=clients.filter(x=>x.id!==id);
  delete posts[id];
  if(aid===id){
    aid=null;
    document.getElementById('cv').style.display='none';
    document.getElementById('ncv').style.display='flex';
  }
  rSB();updateTodayBadge();toast('Klant verwijderd');
}

// ── STATS ──
function rStats(){
  const all=posts[aid]||[];const cnt={draft:0,scheduled:0,published:0};
  all.forEach(p=>cnt[p.status]++);
  document.getElementById('csub').textContent=`${all.length} posts totaal`;
  const cols={draft:'#AEAEB2',scheduled:'var(--orange)',published:'var(--green)'};
  document.getElementById('chips').innerHTML=Object.entries(cnt).map(([s,n])=>`<div class="chip"><div class="dot" style="background:${cols[s]}"></div>${SNL[s]}: ${n}</div>`).join('');
}
function setF(f,b){filt=f;document.querySelectorAll('.seg-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');rC()}
function setV(v,b){view=v;document.querySelectorAll('.vtab').forEach(x=>x.classList.remove('on'));b.classList.add('on');rC()}

// ── RENDER POSTS ──
function rC(){
  if(!aid)return;
  const area=document.getElementById('area');
  const all=posts[aid]||[];
  const fd=filt==='all'?all:all.filter(p=>p.status===filt);
  if(view==='calendar'){rCal(area,all);return}
  if(!fd.length){area.innerHTML=`<div class="empty"><div class="empty-ico">📭</div><h3>Geen posts</h3><p>${filt==='all'?'Maak je eerste post aan.':'Geen posts met status "'+SNL[filt]+'".'}</p></div>`;return}
  if(view==='grid'){area.innerHTML=`<div class="grid">${fd.map(cCard).join('')}</div>`}
  else{area.innerHTML=`<div class="lv">${fd.map(cList).join('')}</div>`}
}

function getPostFiles(p){return p.imgFiles&&p.imgFiles.length?p.imgFiles:[]}

function fileThumb(p){
  const pf=getPostFiles(p);
  if(!pf.length)return`<div class="ve"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="2" width="18" height="18" rx="3" stroke="#C7C7CC" stroke-width="1.4"/><circle cx="7.5" cy="8.5" r="1.5" fill="#C7C7CC"/><path d="M2 15l5-4 4 4 2.5-2.5 6.5 6" stroke="#C7C7CC" stroke-width="1.4" stroke-linecap="round"/></svg></div>`;
  const first=pf[0];const src=first.url||first.data||'';
  let thumb='';
  if(first.fileType==='pdf')thumb=`<div class="ve"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="1" width="14" height="18" rx="2" stroke="#FF3B30" stroke-width="1.4"/><path d="M2 7h14M6 1v6" stroke="#FF3B30" stroke-width="1.4" stroke-linecap="round"/></svg></div>`;
  else if(first.fileType==='video')thumb=`<div class="ve" style="background:#000;border-radius:inherit;width:100%;height:100%;"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" style="opacity:.6"><circle cx="11" cy="11" r="9" stroke="#fff" stroke-width="1.4"/><path d="M9 8l6 3-6 3V8z" fill="#fff"/></svg></div>`;
  else if(src)thumb=`<img src="${src}" alt="">`;
  else thumb=`<div class="ve"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="2" width="18" height="18" rx="3" stroke="#C7C7CC" stroke-width="1.4"/></svg></div>`;
  const badge=pf.length>1?`<div style="position:absolute;bottom:3px;left:3px;background:rgba(0,0,0,.55);color:#fff;border-radius:4px;font-size:9px;font-weight:700;padding:1px 5px;">+${pf.length-1}</div>`:'';
  return thumb+badge;
}

function todoThumb(p){
  const pf=getPostFiles(p);if(!pf.length)return'📎';
  const first=pf[0];
  if(first.fileType==='pdf')return'<svg width="20" height="20" viewBox="0 0 22 22" fill="none"><rect x="2" y="1" width="14" height="18" rx="2" stroke="#FF3B30" stroke-width="1.4"/><path d="M2 7h14M6 1v6" stroke="#FF3B30" stroke-width="1.4" stroke-linecap="round"/></svg>';
  if(first.fileType==='video')return'<svg width="20" height="20" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="9" stroke="#6D6D72" stroke-width="1.4"/><path d="M9 8l6 3-6 3V8z" fill="#6D6D72"/></svg>';
  const src=first.url||first.data||'';
  return src?`<img src="${src}" alt="">`:'📎';
}

function typeLabel(t){return t==='ad'?'Advertentie':'Organisch'}
function typeCls(t){return t==='ad'?'tb-ad':'tb-org'}
function typeSmall(t){return t==='ad'?'todo-type tb-ad':'todo-type tb-org'}

function cCard(p){
  const hasFile=getPostFiles(p).length>0;

// ── CALENDAR ──
function rCal(area,all){
  const y=cal.getFullYear(),m=cal.getMonth();
  const today=new Date();
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const pad=(first.getDay()+6)%7;
  const MONTHS=['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
  const DAYS=['Ma','Di','Wo','Do','Vr','Za','Zo'];
  const bd={};all.forEach(p=>{if(p.date){bd[p.date]=bd[p.date]||[];bd[p.date].push(p)}});
  const total=Math.ceil((pad+last.getDate())/7)*7;let h='';
  for(let i=0;i<total;i++){
    const d=i-pad+1,inM=d>=1&&d<=last.getDate();
    const dk=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const iT=today.getDate()===d&&today.getMonth()===m&&today.getFullYear()===y;
    const dp=bd[dk]||[];
    h+=`<div class="cc${iT?' tod':''}${!inM?' oth':''}">
      <div class="cnum">${inM?d:''}</div>
      ${dp.slice(0,2).map(p=>`<div class="cdot ${SCL[p.status]}">${e((p.caption||p.platform).slice(0,13))}</div>`).join('')}
      ${dp.length>2?`<div class="cmore">+${dp.length-2}</div>`:''}
    </div>`;
  }
  area.innerHTML=`<div class="calw"><div class="caln"><button class="calnb" onclick="chM(-1)">‹</button><div class="calt">${MONTHS[m]} ${y}</div><button class="calnb" onclick="chM(1)">›</button></div><div class="calg">${DAYS.map(d=>`<div class="cdh">${d}</div>`).join('')}${h}</div></div>`;
}
function chM(d){cal.setMonth(cal.getMonth()+d);rC()}

// ── TODAY VIEW ──
async function rToday(){
  const area=document.getElementById('todayArea');
  const tk=viewKey();
  area.innerHTML=`<div class="empty"><div class="empty-ico" style="font-size:20px">⏳</div><h3>Laden...</h3></div>`;

  const{data,error}=await SB.from('posts')
    .select('*, post_files(*), clients(id,name,color)')
    .eq('date',tk)
    .order('time',{ascending:true,nullsFirst:true});

  if(error){area.innerHTML=`<div class="today-empty"><h3>Fout bij laden</h3><p>${error.message}</p></div>`;return}

  const rows=data||[];
  const total=rows.length;
  const done=rows.filter(r=>checked[tk+'_'+r.id]).length;
  document.getElementById('todaySub').textContent=total?`${done} van ${total} afgerond`:'Geen posts ingepland';

  if(!total){
    const msg=isToday()?'Er staan geen posts ingepland voor vandaag.':'Er staan geen posts ingepland op deze datum.';
    area.innerHTML=`<div class="today-empty"><div style="font-size:44px;opacity:.15">📅</div><h3>${isToday()?'Niets te doen!':'Dag vrij'}</h3><p>${msg}</p></div>`;
    return;
  }

  // group by client
  const byClient={};
  rows.forEach(row=>{
    const cid=row.client_id;
    if(!byClient[cid])byClient[cid]={client:row.clients,posts:[]};
    byClient[cid].posts.push(normPost(row));
  });

  const pct=Math.round(done/total*100);
  let html=`<div class="today-progress"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><span class="prog-label">${pct}% klaar</span></div>`;

  Object.values(byClient).forEach(({client:c,posts:ps})=>{
    if(!c)return;
    const ini=c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const cDone=ps.filter(p=>checked[tk+'_'+p.id]).length;
    html+=`<div class="today-section"><div class="tc-head"><div class="tc-av" style="background:${c.color}1A;color:${c.color}">${ini}</div><span class="tc-name">${e(c.name)}</span><span class="tc-count">${cDone}/${ps.length}</span></div>`;
    ps.forEach(p=>{
      const ck=tk+'_'+p.id;
      const isDone=!!checked[ck];
      const thumb=todoThumb(p);
      const hasFile=getPostFiles(p).length>0;
      const dlBtn=hasFile?`<button class="todo-dl" onclick="dlFromPost('${p.id}','${c.id}')" title="Download"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3.5 6l2.5 2.5L8.5 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 10.5h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>`:'';
      html+=`<div class="todo${isDone?' done':''}" id="todo_${ck.replace(/[^a-z0-9]/gi,'_')}">
        <div class="chk${isDone?' on':''}" onclick="toggleTodo('${ck}')">
          ${isDone?'<svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1.5 4.5l2.5 2.5 3.5-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
        </div>
        <div class="todo-thumb">${thumb}</div>
        <div class="todo-body" onclick="goToPost('${c.id}','${p.id}')" style="cursor:pointer" title="Naar post">
          <div class="todo-cap">${p.caption?e(p.caption):'(geen caption)'}</div>
          <div class="todo-meta">
            ${p.time?`<span class="todo-time">⏰ ${p.time}</span>`:''}
            <span class="todo-pl">${p.platform}</span>
            <span class="${typeSmall(p.postType)}">${typeLabel(p.postType)}</span>
            <span style="font-size:10px;color:var(--accent);font-weight:600">→ bekijken</span>
          </div>
        </div>
        ${dlBtn}
      </div>`;
    });
    html+='</div>';
  });
  area.innerHTML=html;
}

function goToPost(clientId,postId){
  switchNav('clients');
  selC(clientId).then(()=>setTimeout(()=>editP(postId),80));
}

function toggleTodo(ck){
  checked[ck]=!checked[ck];
  localStorage.setItem('sf_checked',JSON.stringify(checked));
  rToday();updateTodayBadge();
  if(checked[ck])toast('Afgevinkt ✓');
}

async function updateTodayBadge(){
  const tk=todayKey();
  const{count}=await SB.from('posts').select('*',{count:'exact',head:true}).eq('date',tk);
  const done=Object.keys(checked).filter(k=>k.startsWith(tk+'_')&&checked[k]).length;
  const rem=(count||0)-done;
  const badge=document.getElementById('todayBadge');
  if(rem>0){badge.style.display='inline-block';badge.textContent=rem}
  else{badge.style.display='none'}
}

// ── CLIENT MODAL ──

function sC(el){document.querySelectorAll('.cdot2').forEach(d=>d.classList.remove('on'));el.classList.add('on')}

// ── POST MODAL ──
function setType(t){
  postType=t;
  document.getElementById('ttOrg').classList.toggle('on',t==='organic');
  document.getElementById('ttOrg').classList.toggle('org',t==='organic');
  document.getElementById('ttAd').classList.toggle('on',t==='ad');
  document.getElementById('ttAd').classList.toggle('ad',t==='ad');

function openPM(){
  eid=null;tags=[];files=[];setType('organic');
  document.getElementById('pmTitle').textContent='Nieuwe post';
  document.getElementById('pCap').value='';
  document.getElementById('pPl').value='Instagram';
  document.getElementById('pSt').value='draft';
  document.getElementById('pDt').value=new Date().toISOString().split('T')[0];
  document.getElementById('pTm').value='09:00';
  rTags();rImg();
  document.getElementById('pm').style.display='flex';
  setTimeout(()=>document.getElementById('pCap').focus(),50);
}

function editP(id){
  const p=(posts[aid]||[]).find(x=>x.id===id);if(!p)return;
  eid=id;tags=[...(p.hashtags||[])];
  files=(p.imgFiles||[]).map(f=>({...f,isNew:false}));
  setType(p.postType||'organic');
  document.getElementById('pmTitle').textContent='Post bewerken';
  document.getElementById('pCap').value=p.caption||'';
  document.getElementById('pPl').value=p.platform||'Instagram';
  document.getElementById('pSt').value=p.status||'draft';
  document.getElementById('pDt').value=p.date||'';
  document.getElementById('pTm').value=p.time||'09:00';
  rTags();rPv();
  document.getElementById('pm').style.display='flex';
}

function closePM(){document.getElementById('pm').style.display='none'}

async function saveP(){
  const cap=document.getElementById('pCap').value.trim();
  if(!cap&&!files.length)return document.getElementById('pCap').focus();
  const btn=document.getElementById('btnSaveP');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';

  const postData={
    client_id:aid,
    caption:cap,
    platform:document.getElementById('pPl').value,
    status:document.getElementById('pSt').value,
    post_type:postType,
    date:document.getElementById('pDt').value||null,
    time:document.getElementById('pTm').value||null,
    hashtags:tags,
  };

  let postId=eid;

  if(eid){
    const{error}=await SB.from('posts').update(postData).eq('id',eid);
    if(error){toast('Fout: '+error.message);btn.disabled=false;btn.textContent='Opslaan';return}
  }else{
    const{data,error}=await SB.from('posts').insert(postData).select().single();
    if(error){toast('Fout: '+error.message);btn.disabled=false;btn.textContent='Opslaan';return}
    postId=data.id;
  }

  // Handle files: compare existing DB files vs current files array
  if(eid){
    const{data:dbFiles}=await SB.from('post_files').select('id,storage_path').eq('post_id',eid);
    const keepIds=new Set(files.filter(f=>f.dbId).map(f=>f.dbId));
    const toDelete=(dbFiles||[]).filter(f=>!keepIds.has(f.id));
    for(const f of toDelete){
      if(f.storage_path)await SB.storage.from('post-files').remove([f.storage_path]);
      await SB.from('post_files').delete().eq('id',f.id);
    }
  }

  // Upload new files
  for(let i=0;i<files.length;i++){
    const f=files[i];
    if(!f.isNew)continue;
    try{
      // Convert base64 to blob more reliably
      const base64=f.data.split(',')[1];
      const mime=f.data.split(',')[0].split(':')[1].split(';')[0];
      const byteChars=atob(base64);
      const byteArr=new Uint8Array(byteChars.length);
      for(let j=0;j<byteChars.length;j++)byteArr[j]=byteChars.charCodeAt(j);
      const blob=new Blob([byteArr],{type:mime});

      const ext=f.name.split('.').pop().toLowerCase()||'bin';
      const path=`${postId}/${Date.now()}${i}.${ext}`;

      console.log('Uploading to path:',path,'mime:',mime,'size:',blob.size);

      const{data:upData,error:upErr}=await SB.storage.from('post-files').upload(path,blob,{contentType:mime,upsert:true});
      if(upErr){
        console.error('Upload error details:',JSON.stringify(upErr));
        toast('Upload fout: '+upErr.message);
        continue;
      }
      const{data:{publicUrl}}=SB.storage.from('post-files').getPublicUrl(path);
      console.log('Public URL:',publicUrl);
      await SB.from('post_files').insert({post_id:postId,file_name:f.name,file_type:f.fileType,storage_path:path,public_url:publicUrl,sort_order:i});
    }catch(err){
      console.error('File upload exception:',err);
      toast('Fout: '+err.message);
    }
  }

  // Update sort order for kept files
  for(const f of files.filter(x=>x.dbId)){
    await SB.from('post_files').update({sort_order:files.indexOf(f)}).eq('id',f.dbId);
  }

  btn.disabled=false;btn.textContent='Opslaan';
  await loadPostsForClient(aid);
  closePM();rStats();rC();updateTodayBadge();
  toast(eid?'Post bijgewerkt':'Post opgeslagen');
}

async function delP(id){
  if(!confirm('Post verwijderen?'))return;
  const p=(posts[aid]||[]).find(x=>x.id===id);
  if(p){
    for(const f of(p.imgFiles||[])){
      if(f.storagePath)await SB.storage.from('post-files').remove([f.storagePath]);
    }
  }
  await SB.from('posts').delete().eq('id',id);
  await loadPostsForClient(aid);
  rStats();rC();updateTodayBadge();toast('Post verwijderd');
}

// ── FILE UPLOAD ──
function getFileType(f){
  if(f.type.startsWith('video/'))return'video';
  if(f.type==='application/pdf')return'pdf';
  return'image';
}

function hImg(ev){readFiles(Array.from(ev.target.files));ev.target.value=''}
function dOv(ev){ev.preventDefault();document.getElementById('uz').classList.add('over')}
function dLv(){document.getElementById('uz').classList.remove('over')}
function dDp(ev){
  ev.preventDefault();dLv();
  const newFiles=Array.from(ev.dataTransfer.files).filter(f=>f.type.startsWith('image/')||f.type.startsWith('video/')||f.type==='application/pdf');
  readFiles(newFiles);
}

function readFiles(newFiles){
  if(!newFiles.length)return;
  let done=0;
  newFiles.forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{
      files.push({data:ev.target.result,name:f.name,fileType:getFileType(f),isNew:true});
      done++;if(done===newFiles.length)rPv();
    };
    r.readAsDataURL(f);
  });
}

function rImg(){
  files=[];
  document.getElementById('uz').style.display='block';
  document.getElementById('pvGrid').style.display='none';
  document.getElementById('pvItems').innerHTML='';
}

function rmFile(idx){files.splice(idx,1);rPv()}

function dlFile(idx){
  const f=files[idx];if(!f)return;
  const src=f.url||f.data;if(!src)return;
  dlFromUrl(src,f.name);
}

function rPv(){
  if(!files.length){rImg();return}
  document.getElementById('uz').style.display='none';
  document.getElementById('pvGrid').style.display='block';
  document.getElementById('pvItems').innerHTML=files.map((f,i)=>{
    const src=f.url||f.data||'';
    let preview='';
    if(f.fileType==='video'&&src)preview=`<video src="${src}" style="width:100%;height:100%;object-fit:cover"></video>`;
    else if(f.fileType==='pdf')preview=`<div class="pv-item-pdf"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="1" width="14" height="20" rx="2" stroke="#FF3B30" stroke-width="1.3"/><path d="M3 7h14M7 1v6" stroke="#FF3B30" stroke-width="1.3" stroke-linecap="round"/></svg><span>${e(f.name)}</span></div>`;
    else if(src)preview=`<img src="${src}" alt="">`;
    return`<div class="pv-item">${preview}<div class="pv-item-overlay"><button class="pdl" onclick="dlFile(${i})"><svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M4.5 1v5M2.5 4.5l2 2 2-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 8h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button><button class="prm" onclick="rmFile(${i})">✕</button></div></div>`;
  }).join('')+`<div class="pv-add" title="Meer toevoegen"><input type="file" accept="image/*,video/*,application/pdf" multiple onchange="hImg(event)"/>+</div>`;
}

// ── DOWNLOAD ──
async function dlFromUrl(url,name){
  try{
    const res=await fetch(url);const blob=await res.blob();
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=name||'bestand';a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    toast('Gedownload');
  }catch(e){window.open(url,'_blank')}
}

function dlFromPost(postId,clientId){
  const all=clientId?(posts[clientId]||[]):Object.values(posts).flat();
  const p=all.find(x=>x.id===postId);
  const f=getPostFiles(p)[0];
  if(!f?.url)return;
  dlFromUrl(f.url,f.name);
}

// ── TAGS ──
function hTag(ev){
  const inp=document.getElementById('ti');
  if((ev.key===' '||ev.key==='Enter')&&inp.value.trim()){
    ev.preventDefault();let t=inp.value.trim();if(!t.startsWith('#'))t='#'+t;if(!tags.includes(t))tags.push(t);inp.value='';rTags();
  }else if(ev.key==='Backspace'&&!inp.value&&tags.length){tags.pop();rTags()}
}
function rmT(i){tags.splice(i,1);rTags()}
function rTags(){const w=document.getElementById('tw'),inp=document.getElementById('ti');w.innerHTML=tags.map((t,i)=>`<span class="tc">${e(t)}<button onclick="rmT(${i})">✕</button></span>`).join('');w.appendChild(inp);inp.value=''}

// ── UTILS ──
function toast(msg){const t=document.getElementById('toast');document.getElementById('tmsg').textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2400)}
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
document.addEventListener('keydown',ev=>{if(ev.key==='Escape'){closePM();document.getElementById('cm').style.display='none'}});
</script>
